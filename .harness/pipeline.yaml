pipeline:
  name: Java Hello World CI
  identifier: Java_Hello_World_CI
  orgIdentifier: default
  projectIdentifier: default_project
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.skpabbaGitHub
        repoName: harness-ci
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Build Test Push
        identifier: Build_Test_Push
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.minikubeskpabba
              namespace: harness-delegate
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Compile
                  identifier: Compile
                  spec:
                    connectorRef: account.Docker_Registry_SKPabba
                    image: maven:3.9-eclipse-temurin-17
                    shell: Sh
                    command: mvn compile -q
              - step:
                  type: Run
                  name: Test
                  identifier: Test
                  spec:
                    connectorRef: account.Docker_Registry_SKPabba
                    image: maven:3.9-eclipse-temurin-17
                    shell: Sh
                    command: mvn test
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - "target/surefire-reports/**/*.xml"
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push to DockerHub
                  identifier: Build_and_Push
                  spec:
                    connectorRef: account.Docker_Registry_SKPabba
                    repo: skpabba/hello-world-java
                    tags:
                      - latest
                      - <+pipeline.sequenceId>
                    dockerfile: Dockerfile
                    context: .
                    optimize: true
    - stage:
        name: Deploy to K8s
        identifier: Deploy_to_K8s
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceDefinition:
              type: Kubernetes
              spec:
                manifests:
                  - manifest:
                      identifier: k8s_manifests
                      type: K8sManifest
                      spec:
                        store:
                          type: Github
                          spec:
                            connectorRef: account.skpabbaGitHub
                            gitFetchType: Branch
                            branch: main
                            paths:
                              - k8s/
                artifacts:
                  primary:
                    primaryArtifactRef: hello_world_docker
                    sources:
                      - identifier: hello_world_docker
                        type: DockerRegistry
                        spec:
                          connectorRef: account.Docker_Registry_SKPabba
                          imagePath: skpabba/hello-world-java
                          tag: <+pipeline.sequenceId>
          environment:
            environmentRef: minikube
            deployToAll: false
            infrastructureDefinitions:
              - identifier: minikube_infra
          execution:
            steps:
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: Rolling_Deploy
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rolling Rollback
                  identifier: Rolling_Rollback
                  spec: {}
