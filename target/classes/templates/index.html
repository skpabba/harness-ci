<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hello World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 64px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 { font-size: 2.5rem; color: #2d3748; margin-bottom: 8px; }
        p { color: #718096; font-size: 1.1rem; margin-bottom: 24px; }
        form { display: flex; gap: 8px; justify-content: center; }
        input {
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #5a67d8; }
        .badge {
            margin-top: 32px;
            display: inline-block;
            background: #f0fff4;
            color: #276749;
            border: 1px solid #9ae6b4;
            border-radius: 999px;
            padding: 4px 14px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 th:text="${message}">Hello, World!</h1>
        <p>Deployed on Kubernetes via Harness CI</p>
        <form method="get" action="/">
            <input type="text" name="name" placeholder="Enter a name" th:value="${name}" />
            <button type="submit">Greet</button>
        </form>
        <span class="badge">&#10003; Running</span>
    </div>
</body>
</html>
